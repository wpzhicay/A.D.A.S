      <rect x="88" y="260" width="16" height="16" fill="none"/>
      <rect x="108" y="260" width="16" height="16" fill="none"/>
      <rect x="128" y="260" width="16" height="16" fill="none"/>
      <rect x="148" y="260" width="16" height="16" fill="none"/>
      <rect x="168" y="260" width="16" height="16" fill="none"/>
      
      <rect x="68" y="282" width="16" height="16" fill="none"/>
      <rect x="88" y="282" width="16" height="16" fill="none"/>
      <rect x="108" y="282" width="16" height="16" fill="none"/>
      <rect x="128" y="282" width="16" height="16" fill="none"/>
      <rect x="148" y="282" width="16" height="16" fill="none"/>
      <rect x="168" y="282" width="16" height="16" fill="none"/>
      
      <rect x="68" y="304" width="16" height="16" fill="none"/>
      <rect x="88" y="304" width="16" height="16" fill="none"/>
      <rect x="108" y="304" width="16" height="16" fill="none"/>
      <rect x="128" y="304" width="16" height="16" fill="none"/>
      <rect x="148" y="304" width="16" height="16" fill="none"/>
      <rect x="168" y="304" width="16" height="16" fill="none"/>
      
      <rect x="68" y="326" width="16" height="16" fill="none"/>
      <rect x="88" y="326" width="16" height="16" fill="none"/>
      <rect x="108" y="326" width="16" height="16" fill="none"/>
      <rect x="128" y="326" width="16" height="16" fill="none"/>
      <rect x="148" y="326" width="16" height="16" fill="none"/>
      <rect x="168" y="326" width="16" height="16" fill="none"/>
