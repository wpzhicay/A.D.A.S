      <rect x="263" y="314" width="16" height="16" fill="none"/>
      <rect x="283" y="314" width="16" height="16" fill="none"/>
      <rect x="303" y="314" width="16" height="16" fill="none"/>
      <rect x="323" y="314" width="16" height="16" fill="none"/>
      
      <rect x="223" y="336" width="16" height="16" fill="none"/>
      <rect x="243" y="336" width="16" height="16" fill="none"/>
      <rect x="263" y="336" width="16" height="16" fill="none"/>
      <rect x="283" y="336" width="16" height="16" fill="none"/>
      <rect x="303" y="336" width="16" height="16" fill="none"/>
      <rect x="323" y="336" width="16" height="16" fill="none"/>
