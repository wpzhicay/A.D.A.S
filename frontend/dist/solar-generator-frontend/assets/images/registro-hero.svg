<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" class="registro-hero">
  <defs>
    <!-- Gradientes -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5aa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ba3d4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente realista para paneles oscuros -->
    <radialGradient id="panelRealistic" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#1e5a96;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d3d6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051f3d;stop-opacity:1" />
    </radialGradient>
    
    <!-- Brillo realista -->
    <linearGradient id="panelShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Gradiente sol -->
    <radialGradient id="sunGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ffa500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </radialGradient>
    
    <!-- Sombras -->
    <filter id="shadowDeep" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
    
    <filter id="shadowLight" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Cielo degradado -->
  <rect width="500" height="400" fill="url(#skyGrad)"/>

  <!-- Nubes suaves -->
  <ellipse cx="80" cy="60" rx="45" ry="25" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="120" cy="70" rx="55" ry="20" fill="#ffffff" opacity="0.1"/>
  <ellipse cx="420" cy="100" rx="50" ry="25" fill="#ffffff" opacity="0.12"/>

  <!-- Sol grande y realista -->
  <circle cx="420" cy="70" r="45" fill="url(#sunGrad)" filter="url(#shadowDeep)"/>
  
  <!-- Rayos de sol suave -->
  <g stroke="#ffed4e" stroke-width="2" stroke-linecap="round" opacity="0.3">
    <line x1="420" y1="15" x2="420" y2="0"/>
    <line x1="420" y1="125" x2="420" y2="140"/>
    <line x1="475" y1="70" x2="490" y2="70"/>
    <line x1="365" y1="70" x2="350" y2="70"/>
    <line x1="465" y1="25" x2="475" y2="15"/>
    <line x1="375" y1="115" x2="365" y2="125"/>
    <line x1="465" y1="115" x2="475" y2="125"/>
    <line x1="375" y1="25" x2="365" y2="15"/>
  </g>

  <!-- PANEL 1 - Arriba izquierda (con perspectiva) -->
  <g filter="url(#shadowDeep)">
    <!-- Marco principal del panel -->
    <rect x="30" y="140" width="130" height="90" rx="3" fill="url(#panelRealistic)" stroke="#0a1929" stroke-width="2"/>
    
    <!-- Celdas solares 6x4 grid -->
    <g stroke="#1e5a96" stroke-width="0.8" opacity="0.6">
      <!-- Fila 1 -->
      <rect x="38" y="150" width="16" height="16" fill="none"/>
      <rect x="58" y="150" width="16" height="16" fill="none"/>
      <rect x="78" y="150" width="16" height="16" fill="none"/>
      <rect x="98" y="150" width="16" height="16" fill="none"/>
      <rect x="118" y="150" width="16" height="16" fill="none"/>
      <rect x="138" y="150" width="16" height="16" fill="none"/>
      
      <!-- Fila 2 -->
      <rect x="38" y="172" width="16" height="16" fill="none"/>
      <rect x="58" y="172" width="16" height="16" fill="none"/>
      <rect x="78" y="172" width="16" height="16" fill="none"/>
      <rect x="98" y="172" width="16" height="16" fill="none"/>
      <rect x="118" y="172" width="16" height="16" fill="none"/>
      <rect x="138" y="172" width="16" height="16" fill="none"/>
      
      <!-- Fila 3 -->
      <rect x="38" y="194" width="16" height="16" fill="none"/>
      <rect x="58" y="194" width="16" height="16" fill="none"/>
      <rect x="78" y="194" width="16" height="16" fill="none"/>
      <rect x="98" y="194" width="16" height="16" fill="none"/>
      <rect x="118" y="194" width="16" height="16" fill="none"/>
      <rect x="138" y="194" width="16" height="16" fill="none"/>
      
      <!-- Fila 4 -->
      <rect x="38" y="216" width="16" height="16" fill="none"/>
      <rect x="58" y="216" width="16" height="16" fill="none"/>
      <rect x="78" y="216" width="16" height="16" fill="none"/>
      <rect x="98" y="216" width="16" height="16" fill="none"/>
      <rect x="118" y="216" width="16" height="16" fill="none"/>
      <rect x="138" y="216" width="16" height="16" fill="none"/>
    </g>
    
    <!-- Brillo superior -->
    <rect x="30" y="140" width="130" height="90" rx="3" fill="url(#panelShine)"/>
    
    <!-- Conexiones -->
    <rect x="25" y="200" width="8" height="12" fill="#ff6b35" rx="1"/>
    <rect x="167" y="200" width="8" height="12" fill="#ff6b35" rx="1"/>
  </g>

