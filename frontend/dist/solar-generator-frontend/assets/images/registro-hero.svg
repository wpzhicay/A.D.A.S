      <rect x="193" y="172" width="16" height="16" fill="none"/>
      <rect x="213" y="172" width="16" height="16" fill="none"/>
      <rect x="233" y="172" width="16" height="16" fill="none"/>
      <rect x="253" y="172" width="16" height="16" fill="none"/>
      <rect x="273" y="172" width="16" height="16" fill="none"/>
      <rect x="293" y="172" width="16" height="16" fill="none"/>
      
      <rect x="193" y="194" width="16" height="16" fill="none"/>
      <rect x="213" y="194" width="16" height="16" fill="none"/>
      <rect x="233" y="194" width="16" height="16" fill="none"/>
      <rect x="253" y="194" width="16" height="16" fill="none"/>
      <rect x="273" y="194" width="16" height="16" fill="none"/>
      <rect x="293" y="194" width="16" height="16" fill="none"/>
      
      <rect x="193" y="216" width="16" height="16" fill="none"/>
      <rect x="213" y="216" width="16" height="16" fill="none"/>
      <rect x="233" y="216" width="16" height="16" fill="none"/>
