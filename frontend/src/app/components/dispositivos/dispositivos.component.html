<div class="container mt-4">
  <h2>Mis Dispositivos</h2>
  <p class="text-muted">Puedes registrar hasta 3 dispositivos ({{ dispositivos.length }}/3)</p>

  <div *ngIf="error" class="alert alert-danger">
    ⚠️ {{ error }}
  </div>

  <!-- Lista de dispositivos -->
  <div class="row">
    <div *ngFor="let dispositivo of dispositivos" class="col-md-4 mb-3">
      <div class="card dispositivo-card">
        <div class="card-body">
          <h5 class="card-title">{{ dispositivo.nombre }}</h5>
          <p class="card-text">
            <small><strong>Serie:</strong> {{ dispositivo.serie }}</small>
          </p>
          <p class="card-text">
            <small>
              <strong>Estado:</strong>
              <span [ngClass]="dispositivo.estado === 'ONLINE' ? 'status-online' : 'status-offline'">
                {{ dispositivo.estado }}
              </span>
            </small>
          </p>
          <button class="btn btn-sm btn-danger" (click)="eliminarDispositivo(dispositivo.id)">
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <!-- Botón para agregar dispositivo -->
    <div *ngIf="puedeAgregarMas()" class="col-md-4 mb-3">
      <div class="card dispositivo-card add-card" (click)="mostrarFormulario = !mostrarFormulario">
        <div class="card-body text-center">
          <h5>+ Nuevo Dispositivo</h5>
        </div>
      </div>
    </div>
  </div>

  <!-- Formulario para agregar dispositivo -->
  <div *ngIf="mostrarFormulario && puedeAgregarMas()" class="card mt-4">
    <div class="card-header bg-primary text-white">
      <h5>Registrar Nuevo Dispositivo</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="dispositifForm" (ngSubmit)="agregarDispositivo()">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre del Dispositivo</label>
          <input
            type="text"
            class="form-control"
            id="nombre"
            formControlName="nombre"
            placeholder="Ej: Panel Solar 1"
          />
        </div>

        <div class="mb-3">
          <label for="serie" class="form-label">Número de Serie</label>
          <input
            type="text"
            class="form-control"
            id="serie"
            formControlName="serie"
            placeholder="Ej: ESP32-12345"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading || dispositifForm.invalid"
        >
          <span *ngIf="!loading">Registrar Dispositivo</span>
          <span *ngIf="loading">Registrando...</span>
        </button>
        <button type="button" class="btn btn-secondary ms-2" (click)="mostrarFormulario = false">
          Cancelar
        </button>
      </form>
    </div>
  </div>
</div>
