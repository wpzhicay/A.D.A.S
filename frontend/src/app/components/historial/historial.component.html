<div class="historial-container">
  <h2>📊 Historial de Mediciones</h2>

  <div class="graficos-grid">
    <!-- Gráfico Voltaje -->
    <div class="grafico-card">
      <h3>⚡ Voltaje en Tiempo Real</h3>
      <canvas
        baseChart
        [data]="voltajeChartConfig.data"
        [options]="voltajeChartConfig.options"
        [type]="voltajeChartConfig.type"
      ></canvas>
    </div>

    <!-- Gráfico Corriente -->
    <div class="grafico-card">
      <h3>🔌 Corriente en Tiempo Real</h3>
      <canvas
        baseChart
        [data]="corrienteChartConfig.data"
        [options]="corrienteChartConfig.options"
        [type]="corrienteChartConfig.type"
      ></canvas>
    </div>

    <!-- Gráfico Temperatura -->
    <div class="grafico-card">
      <h3>🌡️ Temperatura en Tiempo Real</h3>
      <canvas
        baseChart
        [data]="temperaturaChartConfig.data"
        [options]="temperaturaChartConfig.options"
        [type]="temperaturaChartConfig.type"
      ></canvas>
    </div>

    <!-- Gráfico Batería -->
    <div class="grafico-card">
      <h3>🔋 Nivel de Batería en Tiempo Real</h3>
      <canvas
        baseChart
        [data]="bateriaChartConfig.data"
        [options]="bateriaChartConfig.options"
        [type]="bateriaChartConfig.type"
      ></canvas>
    </div>
  </div>

  <div class="info-panel">
    <p>
      <strong>📅 Última actualización:</strong> {{ labels[labels.length - 1] || 'Cargando...' }}
    </p>
    <p><strong>📈 Datos mostrados:</strong> Últimas 24 mediciones</p>
    <p><strong>⏱️ Actualización:</strong> Cada 30 segundos</p>
  </div>
</div>
