<div class="container">
  <h1>Configuración</h1>
  <div class="row">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header bg-dark text-white">⚙️ Configurar Dispositivo</div>
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Nombre del Dispositivo</label>
              <input type="text" class="form-control" placeholder="Panel Solar" />
            </div>
            <div class="mb-3">
              <label class="form-label">Intervalo de Envío (segundos)</label>
              <input type="number" class="form-control" placeholder="60" />
            </div>
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" />
            </div>
            <button type="submit" class="btn btn-primary">
              Guardar Cambios
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
