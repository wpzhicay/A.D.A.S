<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <h1>
        <svg style="width: 32px; height: 32px; vertical-align: middle; margin-right: 8px; display: inline-block; color: #0284c7; stroke: currentColor; fill: none; stroke-width: 2;" viewBox="0 0 24 24">
          <polygon points="12 2 20 7 20 17 12 22 4 17 4 7 12 2"></polygon>
          <line x1="12" y1="12" x2="12" y2="16"></line>
          <line x1="12" y1="8" x2="12" y2="4"></line>
        </svg>
        A.D.A. SOLAR
      </h1>
      <p>Sistema de Monitoreo Inteligente</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input
          type="email"
          id="correo"
          class="form-control"
          formControlName="correo"
          placeholder="tu@email.com"
          [class.is-invalid]="
            loginForm.get('correo')?.invalid &&
            (loginForm.get('correo')?.dirty || loginForm.get('correo')?.touched)
          "
        />
        <small class="text-danger" *ngIf="loginForm.get('correo')?.invalid && loginForm.get('correo')?.touched">
          Por favor ingresa un correo válido
        </small>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="Contraseña"
          [class.is-invalid]="
            loginForm.get('password')?.invalid &&
            (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)
          "
        />
        <small class="text-danger" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña debe tener al menos 6 caracteres
        </small>
      </div>

      <div *ngIf="error" class="alert alert-danger">
        ⚠️ {{ error }}
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loading || loginForm.invalid"
      >
        <span *ngIf="!loading">Iniciar Sesión</span>
        <span *ngIf="loading">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Cargando...
        </span>
      </button>

      <div class="register-link mt-3 text-center">
        <p class="text-muted">¿No tienes cuenta?</p>
        <button type="button" class="btn btn-link" (click)="irAlRegistro()">Regístrate aquí</button>
      </div>
    </form>
  </div>

  <div class="login-footer">
    <p>&copy; 2026 A.D.A. SOLAR - Monitoring System</p>
  </div>
</div>
